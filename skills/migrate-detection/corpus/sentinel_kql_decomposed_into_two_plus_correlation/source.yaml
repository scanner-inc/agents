id: 99999999-0000-0000-0000-000000000002
name: Failed Azure AD logon burst followed by successful sign-in from new country
description: |
  Detects a brute-force-like pattern: 10+ failed Azure AD sign-ins from the same
  user within 1 hour, followed by a successful sign-in from a country that user
  hasn't signed in from in the previous 30 days.
severity: High
requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - SigninLogs
queryFrequency: 1h
queryPeriod: 24h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CredentialAccess
  - InitialAccess
relevantTechniques:
  - T1110
  - T1078.004
query: |
  let lookback = 30d;
  let recentFailures =
    SigninLogs
    | where TimeGenerated > ago(1h)
    | where ResultType != 0
    | summarize FailureCount = count() by UserPrincipalName
    | where FailureCount > 10;
  let userHistoricalCountries =
    SigninLogs
    | where TimeGenerated > ago(lookback) and TimeGenerated < ago(1h)
    | where ResultType == 0
    | summarize HistoricalCountries = make_set(LocationDetails.countryOrRegion) by UserPrincipalName;
  SigninLogs
  | where TimeGenerated > ago(1h)
  | where ResultType == 0
  | join kind=inner recentFailures on UserPrincipalName
  | join kind=inner userHistoricalCountries on UserPrincipalName
  | where LocationDetails.countryOrRegion !in (HistoricalCountries)
  | project UserPrincipalName, IPAddress, LocationDetails, FailureCount, HistoricalCountries
